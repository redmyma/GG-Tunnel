name: Auto Run GG-Tunnel and Save Config

on:
  workflow_dispatch:

jobs:
  auto-run-codespace:
    name: Auto Run GG-Tunnel in Codespace
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Auth with GitHub CLI (Smart Auth)
        id: auth_step
        run: |
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            echo "✅ PAT_TOKEN found in secrets. Logging in using token..."
            echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
            gh auth status
          else
            echo "⚠️ PAT_TOKEN is missing! Switching to Interactive Device Web Flow..."
            echo "--------------------------------------------------------"
            echo "Please look at the output below, copy the code, and open:"
            echo "https://github.com/login/device"
            echo "--------------------------------------------------------"
            
            # ۵ دقیقه منتظر تایید کد توسط شما می‌ماند
            timeout 300 gh auth login --web --scopes "repo,codespace,workflow" || {
              echo "❌ Authentication timeout or failed after 5 minutes."
              exit 1
            }
            
            echo "✅ Device Authentication Successful!"
            gh auth status
          fi

      - name: Create codespace
        id: create_cs
        run: |
          echo "Creating codespace from ${{ github.repository }}..."
          
          CS_NAME=$(gh codespace create \
            --repo ${{ github.repository }} \
            --branch main \
            --machine basicLinux32gb \
            --display-name "gg-tunnel-run-$(date +%Y%m%d-%H%M%S)" \
            --idle-timeout 30m \
            --retention-period 1d \
            --json name --jq '.name')
          
          if [ -z "$CS_NAME" ] || [[ "$CS_NAME" == *"error"* ]]; then
            echo "Failed to create codespace"
            exit 1
          fi
          
          echo "cs_name=$CS_NAME" >> $GITHUB_OUTPUT
          echo "Codespace created: $CS_NAME"

      - name: Wait for codespace initialization
        run: |
          echo "Waiting 90 seconds for devcontainer features to boot up..."
          sleep 90

      - name: Monitor devcontainer logs and wait for completion
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          echo "Connecting to $CS to check creation logs..."
          
          # اتصال مستقیم با gh codespace ssh بدون نیاز به کلیدهای جفت شده روی اکانت
          for i in {1..15}; do
            STATUS=$(gh codespace ssh -c "$CS" -- bash -c "cat /workspaces/.codespaces/.proxy/vscodeserver/creation.log 2>/dev/null | grep -i 'creation' | tail -1" || true)
            echo "Checking setup status... Attempt $i"
            sleep 20
          done

      - name: Capture terminal logs & application output
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          
          if [ -z "$CS" ]; then
            echo "No codespace found"
            exit 1
          fi
          
          # جمع‌آوری تمام لاگ‌ها با استفاده از قابلیت پروکسی مستقیم CLI
          gh codespace ssh -c "$CS" -- bash -c '
            echo "=== TERMINAL OUTPUT ==="
            
            if [ -d "/workspaces" ]; then
               find /workspaces -type f -name "*.log" -exec echo "--- File: {} ---" \; -exec cat {} \;
            fi
            
            if [ -d "$HOME/.vscode-remote/data/logs" ]; then
              find $HOME/.vscode-remote/data/logs/ -type f -name "*.log" -exec cat {} \;
            fi
            
            ps aux
          ' 2>&1 | tee terminal_full_output.log

      - name: Extract config
        run: |
          if grep -q "G-Tunnel GAMING CONFIGS" terminal_full_output.log; then
            echo "Target config found! Extracting..."
            sed -n '/G-Tunnel GAMING CONFIGS/,$p' terminal_full_output.log > Config.txt
          else
            echo "Target config pattern not found in logs. Saving full logs to Config.txt for debugging."
            cat terminal_full_output.log > Config.txt
          fi

      - name: Save Config.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Config.txt
          git commit -m "Update Config.txt [skip ci]" || true
          git push origin main || true

      - name: Cleanup Codespace
        if: always()
        run: |
          CS="${{ steps.create_cs.outputs.cs_name }}"
          if [ -n "$CS" ]; then
            echo "Deleting codespace: $CS"
            gh codespace delete -c "$CS" --force || true
          fi
